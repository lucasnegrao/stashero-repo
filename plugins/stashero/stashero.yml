name: Stashero
description: Rename scene files based on metadata with customizable templates
version: 0.5
url: https://github.com/lucasnegrao/stashero
ui:
  javascript:
    - "ui/bundle.js"
  css:
    - "ui/styles/stashero.css"

exec:
  - python3
  - "{pluginDir}/stashero.py"
interface: raw

hooks:
  - name: Rename Scene On Update
    description: Run configured rename templates after scene updates
    triggeredBy:
      - Scene.Update.Post
    defaultArgs:
      mode: "hook:run"
      hook_type: Scene.Update.Post
      dry_run: "false"
      debugMode: "false"
